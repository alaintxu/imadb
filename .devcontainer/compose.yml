services:
  nodejs-devcontainer:
    image: registry.gitlab.com/mu-bd-ce/devcontainers/nodejs:latest
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
    volumes:
      - ..:/workspace
    command: sleep infinity
    depends_on:
      - postgres

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: pasahitza
      POSTGRES_DB: ima
    volumes:
      - ../dbdata/:/var/lib/postgresql/data
      - ./initdb/:/docker-entrypoint-initdb.d/
